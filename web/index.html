<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BC MHA Recertification Date Calculator | certdate.ca</title>
<meta name="description" content="Calculate BC Mental Health Act recertification dates based on the initial Form 4.1 certification date.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000000;
    color: #e0e4ea;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .container {
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    padding: 30px 24px;
    flex: 1;
  }
  h1 {
    font-size: 24px;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 16px;
    text-align: center;
    color: #b399cc;
    margin-bottom: 16px;
  }
  hr {
    border: none;
    border-top: 1px solid #4a3d66;
    margin: 12px 0;
  }
  .instruction {
    font-size: 14px;
    margin-bottom: 12px;
  }
  .date-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .date-row label {
    font-size: 14px;
  }
  .date-row select {
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid #4a3d66;
    background: #1e1b2e;
    color: #e0e4ea;
    font-size: 14px;
  }
  .date-row .spacer { width: 12px; }
  .btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 8px;
  }
  button {
    padding: 10px 24px;
    border-radius: 4px;
    border: 1px solid #bfb3d9;
    background: #2d2640;
    color: #e0e4ea;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #e8e0f5; }
  button.primary { background: #4a2d6e; border-color: #7b5ea7; color: #fff; }
  button.primary:hover { background: #5a3d80; }
  #results { margin-top: 8px; }
  .r-cert { font-size: 17px; color: #80ccff; margin: 4px 0; }
  .r-horizon { font-size: 13px; color: #8c8c99; margin-bottom: 4px; }
  .r-title { font-size: 15px; color: #f2e08c; margin: 8px 0 2px 0; }
  .r-period { font-size: 14px; margin: 2px 0 2px 20px; }
  .r-deadline { font-size: 14px; margin: 2px 0 2px 20px; color: #ff8040; font-weight: bold; }
  .r-note { font-size: 12px; color: #72727a; margin: 2px 0; }
  .r-sep { border-top: 1px solid #4a3d66; margin: 6px 0; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; margin-bottom: 12px; }
  th { background: #2d2640; color: #b399dd; text-align: left; padding: 8px 6px; border: 1px solid #4a3d66; font-size: 15px; font-weight: bold; }
  td { padding: 6px; border: 1px solid #4a3d66; vertical-align: top; color: #e0e4ea; }
  tr:nth-child(odd) td { background: #1e1b2e; }
  tr:nth-child(even) td { background: #262138; }
  .action { font-weight: bold; color: #d9bfff; }
  .form-link { color: #d9bfff; }
  .expires { color: #c0334d; font-weight: bold; }

  /* Ad slot */
  .ad-slot {
    max-width: 820px;
    width: 100%;
    margin: 16px auto;
    padding: 0 24px;
    text-align: center;
  }
  .ad-placeholder {
    background: #1e1b2e;
    border: 1px dashed #4a3d66;
    border-radius: 4px;
    padding: 20px;
    color: #555;
    font-size: 12px;
  }

  footer {
    text-align: center;
    font-size: 12px;
    color: #555;
    padding: 16px;
  }

  @media print {
    body { background: #fff; color: #222; }
    .ad-slot, footer, button, .date-row, .instruction, .btn-row { display: none; }
    .r-cert { color: #1a5276; }
    .r-title { color: #333; }
    .r-deadline { color: #c0392b; }
    .r-note { color: #888; }
    hr, .r-sep { border-color: #ccc; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Recertification Date Calculator</h1>
  <div class="subtitle">BC Mental Health Act</div>
  <hr>

  <div class="instruction">Enter Involuntary Hospitalization Date (Form 4.1):</div>

  <div class="date-row">
    <label for="year">Year:</label>
    <select id="year"></select>
    <div class="spacer"></div>
    <label for="month">Month:</label>
    <select id="month"></select>
    <div class="spacer"></div>
    <label for="day">Day:</label>
    <select id="day"></select>
  </div>

  <div class="btn-row">
    <button class="primary" id="calcBtn">Calculate Recertification Dates</button>
    <button id="printBtn">Print</button>
  </div>

  <hr>
  <div id="results"></div>
</div>

<div class="ad-slot">
  <div class="ad-placeholder">Ad Space</div>
</div>

<footer>certdate.ca</footer>

<script>
const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];
const ABBR = [
  "Jan","Feb","Mar","Apr","May","Jun",
  "Jul","Aug","Sep","Oct","Nov","Dec"
];

const yearEl = document.getElementById("year");
const monthEl = document.getElementById("month");
const dayEl = document.getElementById("day");
const calcBtn = document.getElementById("calcBtn");
const printBtn = document.getElementById("printBtn");
const resultsEl = document.getElementById("results");

function isLeap(y) {
  return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
}

function dim(y, m) {
  const t = [31,28,31,30,31,30,31,31,30,31,30,31];
  return m === 2 && isLeap(y) ? 29 : t[m - 1];
}

function nextDay(d) {
  let { year, month, day } = d;
  day++;
  if (day > dim(year, month)) {
    day = 1;
    month++;
    if (month > 12) { month = 1; year++; }
  }
  return { year, month, day };
}

function prevDay(d) {
  let { year, month, day } = d;
  day--;
  if (day < 1) {
    month--;
    if (month < 1) { month = 12; year--; }
    day = dim(year, month);
  }
  return { year, month, day };
}

function period(start, months) {
  let tm = start.month + months;
  let ty = start.year;
  while (tm > 12) { tm -= 12; ty++; }
  const mx = dim(ty, tm);
  let expiry;
  if (start.day <= mx) {
    expiry = prevDay({ year: ty, month: tm, day: start.day });
  } else {
    expiry = { year: ty, month: tm, day: mx };
  }
  return { expiry, next: nextDay(expiry) };
}

function dkey(d) {
  return d.year * 10000 + d.month * 100 + d.day;
}

function fmt(d) {
  return `${ABBR[d.month - 1]} ${d.day}, ${d.year}`;
}

function ord(n) {
  if (n % 100 >= 11 && n % 100 <= 13) return n + "th";
  switch (n % 10) {
    case 1: return n + "st";
    case 2: return n + "nd";
    case 3: return n + "rd";
    default: return n + "th";
  }
}

// Populate dropdowns
function init() {
  const now = new Date();
  const curYear = now.getFullYear();
  for (let y = 2020; y <= 2050; y++) {
    const opt = new Option(y, y);
    if (y === curYear) opt.selected = true;
    yearEl.appendChild(opt);
  }
  MONTHS.forEach((m, i) => {
    const opt = new Option(m, i + 1);
    if (i === now.getMonth()) opt.selected = true;
    monthEl.appendChild(opt);
  });
  refreshDays();
  const d = now.getDate();
  if (d <= dayEl.options.length) dayEl.selectedIndex = d - 1;
}

function refreshDays() {
  const prev = dayEl.selectedIndex;
  dayEl.innerHTML = "";
  const y = parseInt(yearEl.value);
  const m = parseInt(monthEl.value);
  const days = dim(y, m);
  for (let d = 1; d <= days; d++) {
    dayEl.appendChild(new Option(d, d));
  }
  dayEl.selectedIndex = Math.min(prev, dayEl.options.length - 1);
}

yearEl.addEventListener("change", refreshDays);
monthEl.addEventListener("change", refreshDays);

calcBtn.addEventListener("click", calculate);
printBtn.addEventListener("click", () => {
  if (!resultsEl.innerHTML) return;
  window.print();
});

function calculate() {
  resultsEl.innerHTML = "";

  const cert = {
    year: parseInt(yearEl.value),
    month: parseInt(monthEl.value),
    day: parseInt(dayEl.value)
  };

  // 5-year horizon
  let lm = cert.month + 60;
  let ly = cert.year;
  while (lm > 12) { lm -= 12; ly++; }
  const ld = Math.min(cert.day, dim(ly, lm));
  const limit = dkey({ year: ly, month: lm, day: ld });

  let html = "";
  html += `<div class="r-horizon">Five-year horizon from: ${fmt(cert)}  to  ${fmt({ year: ly, month: lm, day: ld })}</div>`;
  html += `<div class="r-sep"></div>`;

  const p0 = period(cert, 1);

  html += `<table>
  <thead><tr>
    <th>Action</th><th>Length of Involuntary Admission</th>
    <th>Begins</th><th>Expires</th>
  </tr></thead><tbody>`;

  // Row 1: 1st Medical Certificate
  html += `<tr>
    <td class="action">1st Medical Certificate (Form 4.1)</td><td>48 hours</td>
    <td>${fmt(cert)} (AKA - involuntary hospitalization date)</td>
    <td class="expires">48 hours after Form 4.1 created on ${fmt(cert)}</td></tr>`;

  // Row 3: 2nd Medical Certificate
  html += `<tr>
    <td class="action">2nd Medical Certificate (Form 4.2)</td>
    <td>1 month from involuntary hospitalization date (minus 1 day)</td>
    <td>${fmt(cert)}</td>
    <td class="expires">${fmt(p0.expiry)} @11:59pm</td></tr>`;

  // Renewal rows
  let cur = p0.next;
  let idx = 0;

  while (true) {
    let dur, action;

    if (idx === 0) {
      dur = 1; action = "1st Renewal";
    } else if (idx === 1) {
      dur = 3; action = "2nd Renewal";
    } else {
      dur = 6;
      action = idx === 2 ? "3rd Renewal and Subsequent Renewals" : ord(idx + 1) + " Renewal";
    }

    const p = period(cur, dur);
    const monthsStr = dur + " month" + (dur === 1 ? "" : "s") + " (minus 1 day)";

    html += `<tr>
      <td class="action">${action} (Form 6)</td><td>${monthsStr}</td>
      <td>${fmt(cur)}</td>
      <td class="expires">${fmt(p.expiry)} @11:59pm</td></tr>`;

    if (dkey(p.next) > limit) break;
    cur = p.next;
    idx++;
  }

  html += `</tbody></table>`;
  html += `<div class="r-sep"></div>`;
  html += `<div class="r-note">Calculated per the Mental Health Act [RSBC 1996] CHAPTER 288 and BC Interpretation Act [RSBC 1996] CHAPTER 238:</div>`;
  html += `<div class="r-note">A "month" = corresponding calendar day of the target month, less one day.</div>`;
  html += `<div class="r-note">When no corresponding day exists, the last day of that month is used.</div>`;
  html += `<div class="r-note">Always manually double check calculations.</div>`;
  html += `<div class="r-sep"></div>`;
  html += `<div class="r-note">Note: The Act offers no guidance regarding how many days prior to the end of the last month of a period the examination must be completed, however, it is recommended this be done reasonably close to the end of the period.</div>`;

  resultsEl.innerHTML = html;
}

init();
</script>
</body>
</html>
